server:
  port: 8084
spring:
  application:
    name: circuit-breaker-demo
resilience4j:
  circuitbreaker:
    instances:
      demoService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
